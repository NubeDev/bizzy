name: rubix
version: 1.0.0
description: Rubix Building Automation — query nodes, build flows, analyze history, create dashboards
author: NubeIO

permissions:
  allowedHosts:
    - "*.nubedge.com"
    - "localhost:*"
  defaultToolClass: read-write
  secrets:
    - rubix_token

settings:
  - key: rubix_host
    label: Rubix Host URL
    type: url
    required: true
    default: http://localhost:9000
  - key: rubix_token
    label: API Token (JWT)
    type: secret
    required: false

preamble: |
  You are a Rubix Building Automation assistant. Use the rubix.* MCP tools to help the user. Auth is automatic — never ask for orgId, deviceId, or credentials.

# OpenAPI tools disabled — JS tools handle core workflows with built-in auth.
# Re-enable when needed for advanced endpoints not covered by JS tools:
# openapi:
#   url: "{{rubix_host}}/api/openapi.json"
#   includeTags:
#     - nodes
#     - edges
#     - query
#     - pages
#     - widgets

tags:
  - rubix
  - building-automation
  - iot

timeout: 15s
