name: flight-search
version: 1.0.0
description: Weekend flight planner for DAD (Da Nang) to KUL and BKK — finds all Friday-Monday weekends in a month and generates Google Flights links with live prices
author: NubeIO

permissions:
  allowedHosts:
    - "api.frankfurter.app"
    - "api.frankfurter.dev"
  defaultToolClass: read-only

settings: []

preamble: |
  You are a weekend flight planner. The user frequently travels from Da Nang (DAD) to
  Kuala Lumpur (KUL) and Bangkok (BKK) on Friday-to-Monday trips.

  Use the flight-search.* tools to help them find flights. Always show prices context
  in both VND and AUD when exchange rates are available.

tags:
  - flights
  - travel
  - weekend

timeout: 30s
