openapi: 3.0.3
info:
  title: Nube Server API
  version: 0.1.0
  description: Multi-tenant central server for NubeIO developer tools — workspace/user management, app catalog, install flow, per-user MCP tool scoping.

servers:
  - url: http://localhost:8090

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Workspace:
      type: object
      properties:
        id:          { type: string }
        name:        { type: string }
        createdAt:   { type: string, format: date-time }

    User:
      type: object
      properties:
        id:          { type: string }
        workspaceId: { type: string }
        name:        { type: string }
        email:       { type: string }
        role:        { type: string, enum: [admin, user] }
        token:       { type: string }
        createdAt:   { type: string, format: date-time }

    App:
      type: object
      properties:
        name:        { type: string }
        version:     { type: string }
        description: { type: string }
        author:      { type: string }
        hasOpenAPI:  { type: boolean }
        hasPrompts:  { type: boolean }
        hasTools:    { type: boolean }
        tags:        { type: array, items: { type: string } }

    AppInstall:
      type: object
      properties:
        id:          { type: string }
        appName:     { type: string }
        appVersion:  { type: string }
        userId:      { type: string }
        enabled:     { type: boolean }
        stale:       { type: boolean }
        settings:    { type: object, additionalProperties: { type: string } }
        createdAt:   { type: string, format: date-time }

paths:
  /health:
    get:
      operationId: getHealth
      summary: Server health and stats
      security: []
      x-cli:
        command: status
      responses:
        "200":
          description: OK

  /bootstrap:
    post:
      operationId: bootstrap
      summary: Create first workspace and admin user
      security: []
      x-cli:
        command: bootstrap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceName, adminName, adminEmail]
              properties:
                workspaceName: { type: string, description: Workspace name }
                adminName:     { type: string, description: Admin user name }
                adminEmail:    { type: string, description: Admin email address }
      responses:
        "201":
          description: Created

  /users/me:
    get:
      operationId: getMe
      summary: Get current user profile
      x-cli:
        command: users me
      responses:
        "200":
          description: OK

  /users/{id}:
    get:
      operationId: getUser
      summary: Get user by ID (admin)
      x-cli:
        command: users get
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: User ID
      responses:
        "200":
          description: OK

    delete:
      operationId: deleteUser
      summary: Delete user (admin)
      x-cli:
        command: users delete
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted

  /users/{id}/token:
    post:
      operationId: rotateToken
      summary: Rotate user token (self or admin)
      x-cli:
        command: tokens rotate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: User ID (use your own or another user's if admin)
      responses:
        "200":
          description: New token returned

    delete:
      operationId: revokeToken
      summary: Revoke user token (self or admin)
      x-cli:
        command: tokens revoke
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: User ID
      responses:
        "200":
          description: Token revoked

  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces (admin sees all, user sees own)
      x-cli:
        command: workspaces list
      responses:
        "200":
          description: OK

    post:
      operationId: createWorkspace
      summary: Create workspace (admin)
      x-cli:
        command: workspaces create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, description: Workspace name }
      responses:
        "201":
          description: Created

  /workspaces/{id}:
    get:
      operationId: getWorkspace
      summary: Get workspace by ID
      x-cli:
        command: workspaces get
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

    delete:
      operationId: deleteWorkspace
      summary: Delete workspace (admin, must be empty)
      x-cli:
        command: workspaces delete
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted

  /workspaces/{id}/users:
    get:
      operationId: listWorkspaceUsers
      summary: List users in workspace
      x-cli:
        command: workspaces users
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Workspace ID
      responses:
        "200":
          description: OK

    post:
      operationId: createUser
      summary: Create user in workspace (admin)
      x-cli:
        command: users create
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Workspace ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:  { type: string, description: User display name }
                email: { type: string, description: User email }
                role:  { type: string, enum: [admin, user], default: user, description: "User role" }
      responses:
        "201":
          description: Created (includes token)

  /apps:
    get:
      operationId: listApps
      summary: List available apps from catalog
      x-cli:
        command: apps list
      responses:
        "200":
          description: OK

  /apps/{id}:
    get:
      operationId: getApp
      summary: Get app details + prompts
      x-cli:
        command: apps get
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      responses:
        "200":
          description: OK

  /apps/{id}/install:
    post:
      operationId: installApp
      summary: Install app for current user
      x-cli:
        command: apps install
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: object
                  additionalProperties: { type: string }
                  description: "App settings as key=value pairs"
      responses:
        "201":
          description: Installed

  /app-installs:
    get:
      operationId: listInstalls
      summary: List current user's installed apps
      x-cli:
        command: installs list
      responses:
        "200":
          description: OK

  /app-installs/{id}:
    patch:
      operationId: updateInstall
      summary: Enable/disable or update install settings
      x-cli:
        command: installs update
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Install ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:  { type: boolean, description: Enable or disable }
                settings: { type: object, additionalProperties: { type: string } }
      responses:
        "200":
          description: Updated

    delete:
      operationId: uninstallApp
      summary: Uninstall app
      x-cli:
        command: installs delete
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Install ID
      responses:
        "200":
          description: Uninstalled

  /my/tools:
    get:
      operationId: listMyTools
      summary: List tools available to you (from installed apps)
      x-cli:
        command: tools list
      responses:
        "200":
          description: OK

  /my/prompts:
    get:
      operationId: listMyPrompts
      summary: List prompts available to you (from installed apps)
      x-cli:
        command: prompts list
      responses:
        "200":
          description: OK

  /my/prompts/{name}:
    get:
      operationId: getPrompt
      summary: Render a prompt with arguments
      x-cli:
        command: prompts get
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: "Prompt name (e.g. nube-marketing.marketing_plan)"
        - name: product
          in: query
          schema: { type: string }
          description: Product/feature name (for prompts that use it)
        - name: audience
          in: query
          schema: { type: string }
          description: Target audience (for prompts that use it)
        - name: content
          in: query
          schema: { type: string }
          description: Content to review (for prompts that use it)
        - name: device_id
          in: query
          schema: { type: string }
          description: Device ID (for prompts that use it)
        - name: symptom
          in: query
          schema: { type: string }
          description: Symptom description (for prompts that use it)
      responses:
        "200":
          description: Rendered prompt

  /admin/reload-apps:
    post:
      operationId: reloadApps
      summary: Re-scan apps directory (admin)
      x-cli:
        command: admin reload
      responses:
        "200":
          description: Apps reloaded
