openapi: 3.0.3
info:
  title: Nube Server API
  version: 0.2.0
  description: >
    Multi-tenant central server for NubeIO — workspace/user management,
    app catalog, install flow, per-user MCP tool scoping, agent execution,
    app store with reviews and sharing.

servers:
  - url: http://localhost:8090

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Workspace:
      type: object
      properties:
        id:          { type: string }
        name:        { type: string }
        createdAt:   { type: string, format: date-time }

    User:
      type: object
      properties:
        id:          { type: string }
        workspaceId: { type: string }
        name:        { type: string }
        email:       { type: string }
        role:        { type: string, enum: [admin, user] }
        token:       { type: string }
        createdAt:   { type: string, format: date-time }

    App:
      type: object
      properties:
        name:        { type: string }
        version:     { type: string }
        description: { type: string }
        author:      { type: string }
        hasOpenAPI:  { type: boolean }
        hasPrompts:  { type: boolean }
        hasTools:    { type: boolean }
        tags:        { type: array, items: { type: string } }

    AppInstall:
      type: object
      properties:
        id:          { type: string }
        appName:     { type: string }
        appVersion:  { type: string }
        userId:      { type: string }
        enabled:     { type: boolean }
        stale:       { type: boolean }
        settings:    { type: object, additionalProperties: { type: string } }
        createdAt:   { type: string, format: date-time }

    Session:
      type: object
      properties:
        id:                { type: string }
        provider:          { type: string }
        model:             { type: string }
        claude_session_id: { type: string }
        agent:             { type: string }
        prompt:            { type: string }
        result:            { type: string }
        status:            { type: string }
        duration_ms:       { type: integer }
        cost_usd:          { type: number }
        input_tokens:      { type: integer }
        output_tokens:     { type: integer }
        tool_calls:        { type: integer }
        user_id:           { type: string }
        created_at:        { type: string, format: date-time }

    Job:
      type: object
      properties:
        job_id:   { type: string }
        status:   { type: string, enum: [running, done, error, cancelled] }
        provider: { type: string }
        model:    { type: string }
        events:   { type: array, items: { $ref: '#/components/schemas/JobEvent' } }
        result:   { type: string }

    JobEvent:
      type: object
      properties:
        index:       { type: integer }
        type:        { type: string }
        provider:    { type: string }
        session_id:  { type: string }
        model:       { type: string }
        name:        { type: string }
        content:     { type: string }
        error:       { type: string }
        duration_ms: { type: integer }
        cost_usd:    { type: number }

    StoreApp:
      type: object
      properties:
        id:              { type: string }
        name:            { type: string }
        displayName:     { type: string }
        description:     { type: string }
        longDescription: { type: string }
        version:         { type: string }
        icon:            { type: string }
        color:           { type: string }
        category:        { type: string }
        tags:            { type: array, items: { type: string } }
        authorId:        { type: string }
        authorName:      { type: string }
        visibility:      { type: string, enum: [private, shared, unlisted, public] }
        installCount:    { type: integer }
        activeInstalls:  { type: integer }
        avgRating:       { type: number }
        reviewCount:     { type: integer }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
        publishedAt:     { type: string, format: date-time }

    AppReview:
      type: object
      properties:
        id:        { type: string }
        appId:     { type: string }
        userId:    { type: string }
        userName:  { type: string }
        rating:    { type: integer }
        comment:   { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AppShare:
      type: object
      properties:
        id:        { type: string }
        appId:     { type: string }
        invitedBy: { type: string }
        inviteeId: { type: string }
        token:     { type: string }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }

    WorkflowRun:
      type: object
      properties:
        id:          { type: string, description: "Client-generated UUID (idempotency key)" }
        app:         { type: string }
        workflow:    { type: string }
        inputs:      { type: object, additionalProperties: true }
        status:      { type: string, enum: [running, waiting_approval, completed, failed, cancelled] }
        version:     { type: integer, description: "Increments on every stage transition" }
        stages:      { type: array, items: { $ref: '#/components/schemas/StageResult' } }
        current_idx: { type: integer }
        failed_at:   { type: string }
        error:       { type: string }
        user_id:     { type: string }
        created_at:  { type: string, format: date-time }
        finished_at: { type: string, format: date-time }

    StageResult:
      type: object
      properties:
        name:        { type: string }
        status:      { type: string, enum: [pending, running, completed, failed, skipped, waiting] }
        output:      { description: "Stage output (type varies)" }
        error:       { type: string }
        duration_ms: { type: integer }
        started_at:  { type: string, format: date-time }

    WorkflowDef:
      type: object
      properties:
        app:         { type: string }
        name:        { type: string }
        description: { type: string }
        depends:     { type: array, items: { type: string } }
        inputs:
          type: array
          items:
            type: object
            properties:
              name:        { type: string }
              description: { type: string }
              required:    { type: boolean }
              options:     { type: array, items: { type: string } }
              default:     { type: string }
        stage_count: { type: integer }

# =============================================================================
# Paths — every route from router.go with x-cli for auto-generated CLI commands
# =============================================================================
paths:

  # ---------------------------------------------------------------------------
  # Public (no auth)
  # ---------------------------------------------------------------------------

  /health:
    get:
      operationId: getHealth
      summary: Server health and stats
      security: []
      x-cli:
        command: status
      responses:
        "200":
          description: OK

  /bootstrap:
    post:
      operationId: bootstrap
      summary: Create first workspace and admin user
      security: []
      x-cli:
        command: bootstrap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceName, adminName, adminEmail]
              properties:
                workspaceName: { type: string, description: Workspace name }
                adminName:     { type: string, description: Admin user name }
                adminEmail:    { type: string, description: Admin email address }
      responses:
        "201":
          description: Created

  # ---------------------------------------------------------------------------
  # User management
  # ---------------------------------------------------------------------------

  /users/me:
    get:
      operationId: getMe
      summary: Get current user profile
      x-cli:
        command: users me
      responses:
        "200":
          description: OK

  /users/{id}:
    get:
      operationId: getUser
      summary: Get user by ID (admin)
      x-cli:
        command: users get
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: User ID
      responses:
        "200":
          description: OK

    delete:
      operationId: deleteUser
      summary: Delete user (admin)
      x-cli:
        command: users delete
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: User ID
      responses:
        "200":
          description: Deleted

  /users/{id}/token:
    post:
      operationId: rotateToken
      summary: Rotate user token (self or admin)
      x-cli:
        command: tokens rotate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: User ID
      responses:
        "200":
          description: New token returned

    delete:
      operationId: revokeToken
      summary: Revoke user token (self or admin)
      x-cli:
        command: tokens revoke
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: User ID
      responses:
        "200":
          description: Token revoked

  # ---------------------------------------------------------------------------
  # Workspaces
  # ---------------------------------------------------------------------------

  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces (admin sees all, user sees own)
      x-cli:
        command: workspaces list
      responses:
        "200":
          description: OK

    post:
      operationId: createWorkspace
      summary: Create workspace (admin)
      x-cli:
        command: workspaces create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, description: Workspace name }
      responses:
        "201":
          description: Created

  /workspaces/{id}:
    get:
      operationId: getWorkspace
      summary: Get workspace by ID
      x-cli:
        command: workspaces get
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Workspace ID
      responses:
        "200":
          description: OK

    delete:
      operationId: deleteWorkspace
      summary: Delete workspace (admin, must be empty)
      x-cli:
        command: workspaces delete
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Workspace ID
      responses:
        "200":
          description: Deleted

  /workspaces/{id}/users:
    get:
      operationId: listWorkspaceUsers
      summary: List users in workspace
      x-cli:
        command: workspaces users
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Workspace ID
      responses:
        "200":
          description: OK

    post:
      operationId: createUser
      summary: Create user in workspace (admin)
      x-cli:
        command: users create
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Workspace ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:  { type: string, description: User display name }
                email: { type: string, description: User email }
                role:  { type: string, enum: [admin, user], default: user, description: "User role" }
      responses:
        "201":
          description: Created (includes token)

  # ---------------------------------------------------------------------------
  # App catalog (disk apps)
  # ---------------------------------------------------------------------------

  /apps:
    get:
      operationId: listApps
      summary: List available apps from catalog
      x-cli:
        command: apps list
      responses:
        "200":
          description: OK

    post:
      operationId: createApp
      summary: Create a new app on disk (admin)
      x-cli:
        command: apps create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string, description: "App slug (lowercase, hyphens, 3-50 chars)" }
                description: { type: string, description: App description }
                author:      { type: string, description: Author name }
                version:     { type: string, description: "Semver (default: 1.0.0)" }
                tags:        { type: array, items: { type: string }, description: Search tags }
      responses:
        "201":
          description: Created

  /apps/{id}:
    get:
      operationId: getApp
      summary: Get app details + prompts
      x-cli:
        command: apps get
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      responses:
        "200":
          description: OK

    put:
      operationId: updateApp
      summary: Update app metadata (admin)
      x-cli:
        command: apps update
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string, description: App description }
                version:     { type: string, description: Semver version }
                author:      { type: string, description: Author name }
                tags:        { type: array, items: { type: string }, description: Search tags }
      responses:
        "200":
          description: Updated

    delete:
      operationId: deleteApp
      summary: Delete app from disk (admin)
      x-cli:
        command: apps delete
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      responses:
        "200":
          description: Deleted

  # ---------------------------------------------------------------------------
  # Tools within an app (admin CRUD)
  # ---------------------------------------------------------------------------

  /apps/{id}/tools:
    get:
      operationId: listAppTools
      summary: List tools in an app
      x-cli:
        command: apps tools
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      responses:
        "200":
          description: OK

    post:
      operationId: createAppTool
      summary: Add a JS tool to an app (admin)
      x-cli:
        command: apps add-tool
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, script]
              properties:
                name:        { type: string, description: Tool name }
                description: { type: string, description: Tool description }
                mode:        { type: string, description: "Execution mode (empty or qa)" }
                toolClass:   { type: string, description: "read-only, read-write, or destructive" }
                script:      { type: string, description: "JavaScript source (must define handle(params))" }
      responses:
        "201":
          description: Created

  /apps/{id}/tools/{name}:
    put:
      operationId: updateAppTool
      summary: Update a JS tool (admin)
      x-cli:
        command: apps update-tool
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Tool name
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string, description: Tool description }
                mode:        { type: string, description: "Execution mode (empty or qa)" }
                toolClass:   { type: string, description: "read-only, read-write, or destructive" }
                script:      { type: string, description: JavaScript source }
      responses:
        "200":
          description: Updated

    delete:
      operationId: deleteAppTool
      summary: Delete a tool from an app (admin)
      x-cli:
        command: apps delete-tool
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Tool name
      responses:
        "200":
          description: Deleted

  # ---------------------------------------------------------------------------
  # Prompts within an app (admin CRUD)
  # ---------------------------------------------------------------------------

  /apps/{id}/prompts:
    get:
      operationId: listAppPrompts
      summary: List prompts in an app
      x-cli:
        command: apps prompts
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      responses:
        "200":
          description: OK

    post:
      operationId: createAppPrompt
      summary: Add a prompt to an app (admin)
      x-cli:
        command: apps add-prompt
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, body]
              properties:
                name:        { type: string, description: Prompt name }
                description: { type: string, description: Prompt description }
                body:        { type: string, description: "Markdown body with {{key}} placeholders" }
      responses:
        "201":
          description: Created

  /apps/{id}/prompts/{name}:
    delete:
      operationId: deleteAppPrompt
      summary: Delete a prompt from an app (admin)
      x-cli:
        command: apps delete-prompt
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Prompt name
      responses:
        "200":
          description: Deleted

  # ---------------------------------------------------------------------------
  # App installs
  # ---------------------------------------------------------------------------

  /apps/{id}/install:
    post:
      operationId: installApp
      summary: Install app for current user
      x-cli:
        command: apps install
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: App name
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: object
                  additionalProperties: { type: string }
                  description: "App settings as key=value pairs"
      responses:
        "201":
          description: Installed

  /app-installs:
    get:
      operationId: listInstalls
      summary: List current user's installed apps
      x-cli:
        command: installs list
      responses:
        "200":
          description: OK

  /app-installs/{id}:
    patch:
      operationId: updateInstall
      summary: Enable/disable or update install settings
      x-cli:
        command: installs update
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Install ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:  { type: boolean, description: Enable or disable }
                settings: { type: object, additionalProperties: { type: string } }
      responses:
        "200":
          description: Updated

    delete:
      operationId: uninstallApp
      summary: Uninstall app
      x-cli:
        command: installs delete
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Install ID
      responses:
        "200":
          description: Uninstalled

  # ---------------------------------------------------------------------------
  # My tools & prompts (REST alternative to MCP)
  # ---------------------------------------------------------------------------

  /my/tools:
    get:
      operationId: listMyTools
      summary: List tools available to you (from installed apps)
      # x-cli: replaced by hand-written "nube tools" command
      responses:
        "200":
          description: OK

  /my/prompts:
    get:
      operationId: listMyPrompts
      summary: List prompts available to you (from installed apps)
      # x-cli: replaced by hand-written "nube prompts" command
      responses:
        "200":
          description: OK

  /my/prompts/{name}:
    get:
      operationId: getPrompt
      summary: Render a prompt with arguments
      # x-cli: replaced by hand-written "nube prompts <name>" command
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: "Prompt name (e.g. nube-marketing.marketing_plan)"
        - name: product
          in: query
          schema: { type: string }
          description: Product/feature name (for prompts that use it)
        - name: audience
          in: query
          schema: { type: string }
          description: Target audience (for prompts that use it)
        - name: content
          in: query
          schema: { type: string }
          description: Content to review (for prompts that use it)
        - name: device_id
          in: query
          schema: { type: string }
          description: Device ID (for prompts that use it)
        - name: symptom
          in: query
          schema: { type: string }
          description: Symptom description (for prompts that use it)
      responses:
        "200":
          description: Rendered prompt

  # ---------------------------------------------------------------------------
  # Agents — execution, tools, sessions, providers
  # ---------------------------------------------------------------------------

  /api/agents:
    get:
      operationId: listAgents
      summary: List available agents (derived from installed apps)
      x-cli:
        command: agents list
      responses:
        "200":
          description: OK

  /api/agents/providers:
    get:
      operationId: listProviders
      summary: List AI providers and their availability
      x-cli:
        command: agents providers
      responses:
        "200":
          description: OK

  /api/agents/tools/{name}:
    post:
      operationId: callTool
      summary: Call a tool directly by namespaced name
      x-cli:
        command: agents call
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: "Namespaced tool name (e.g. rubix-developer.device_summary)"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: "Tool parameters as key-value pairs"
      responses:
        "200":
          description: Tool result

  /api/agents/run/sync:
    post:
      operationId: runAgentSync
      summary: Run an agent synchronously (blocks until done)
      x-cli:
        command: agents run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:   { type: string, description: The prompt to send }
                agent:    { type: string, description: "Agent/app name (optional)" }
                provider: { type: string, description: "AI provider: claude, codex, copilot (default: claude)" }
                model:    { type: string, description: "Model override (e.g. o4-mini)" }
      responses:
        "200":
          description: Agent result

  /api/agents/jobs:
    post:
      operationId: submitJob
      summary: Submit an async AI job (returns immediately with job ID)
      # x-cli: hand-written command in cmd_agents.go (supports streaming poll)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:   { type: string, description: The prompt to send }
                agent:    { type: string, description: "Agent/app name (optional)" }
                provider: { type: string, description: "AI provider (default: claude)" }
                model:    { type: string, description: "Model override" }
      responses:
        "202":
          description: Job submitted

  /api/agents/jobs/{id}:
    get:
      operationId: pollJob
      summary: Poll job status and events
      # x-cli: hand-written command in cmd_agents.go (supports streaming poll)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Job ID
        - name: after
          in: query
          required: false
          schema: { type: integer }
          description: "Only return events with index > after (incremental polling)"
      responses:
        "200":
          description: Job state and events
    delete:
      operationId: cancelJob
      summary: Cancel a running job
      # x-cli: could add hand-written cancel command later
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Job ID
      responses:
        "200":
          description: Job cancelled

  /api/agents/sessions:
    get:
      operationId: listSessions
      summary: List agent session history for current user
      x-cli:
        command: sessions list
      responses:
        "200":
          description: OK

  /api/agents/sessions/{id}:
    get:
      operationId: getSession
      summary: Get session detail with full result text
      x-cli:
        command: sessions get
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Session ID
      responses:
        "200":
          description: OK

  # ---------------------------------------------------------------------------
  # Provider test
  # ---------------------------------------------------------------------------

  /api/agents/providers/{name}/test:
    post:
      operationId: testProvider
      summary: Test connectivity to a specific AI provider
      x-cli:
        command: agents test
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: "Provider name (claude, ollama, openai, etc.)"
      responses:
        "200":
          description: Test result with availability, latency, and models

  # ---------------------------------------------------------------------------
  # User preferences
  # ---------------------------------------------------------------------------

  /users/me/preferences:
    get:
      operationId: getUserPreferences
      summary: Get current user's AI preferences (default provider/model)
      x-cli:
        command: preferences get
      responses:
        "200":
          description: OK
    put:
      operationId: updateUserPreferences
      summary: Set current user's default AI provider and model
      x-cli:
        command: preferences set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                default_provider: { type: string, description: "Default provider (claude, ollama, openai, etc.)" }
                default_model:    { type: string, description: "Default model (gemma3, gpt-4.1, etc.)" }
      responses:
        "200":
          description: Preferences updated

  # ---------------------------------------------------------------------------
  # Admin
  # ---------------------------------------------------------------------------

  /api/settings/providers:
    get:
      operationId: getProviderConfig
      summary: Get global provider configuration (admin)
      x-cli:
        command: admin providers
      responses:
        "200":
          description: Provider config with availability
    put:
      operationId: updateProviderConfig
      summary: Update global provider configuration (admin)
      # x-cli: admin-only, use curl or frontend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                providers:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      enabled: { type: boolean }
                      api_key: { type: string }
                      host:    { type: string }
      responses:
        "200":
          description: Config updated

  /admin/reload-apps:
    post:
      operationId: reloadApps
      summary: Re-scan apps directory and rebuild MCP cache (admin)
      x-cli:
        command: admin reload
      responses:
        "200":
          description: Apps reloaded

  # ---------------------------------------------------------------------------
  # App Store — browse & install
  # ---------------------------------------------------------------------------

  /api/store/apps:
    get:
      operationId: listStoreApps
      summary: Browse the app store
      x-cli:
        command: store browse
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Search query
        - name: category
          in: query
          schema: { type: string }
          description: Filter by category
        - name: sort
          in: query
          schema: { type: string, default: popular }
          description: "Sort order: popular, recent, rating, name"
        - name: page
          in: query
          schema: { type: integer, default: 1 }
          description: Page number
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
          description: Results per page (max 50)
      responses:
        "200":
          description: Paginated list of store apps

  /api/store/apps/{id}:
    get:
      operationId: getStoreApp
      summary: Get store app detail
      x-cli:
        command: store get
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
        - name: invite
          in: query
          schema: { type: string }
          description: Share invite token (for shared apps)
      responses:
        "200":
          description: App detail with installed flag

  /api/store/categories:
    get:
      operationId: listCategories
      summary: List app store categories
      x-cli:
        command: store categories
      responses:
        "200":
          description: OK

  /api/store/apps/{id}/install:
    post:
      operationId: installStoreApp
      summary: Install an app from the store
      x-cli:
        command: store install
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: object
                  additionalProperties: { type: string }
                  description: App settings
      responses:
        "201":
          description: Installed

  /api/store/apps/{id}/reviews:
    get:
      operationId: listReviews
      summary: List reviews for an app
      x-cli:
        command: store reviews
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      responses:
        "200":
          description: OK

    post:
      operationId: submitReview
      summary: Submit a review for an app
      x-cli:
        command: store review
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:  { type: integer, description: "Rating 1-5" }
                comment: { type: string, description: Review comment }
      responses:
        "201":
          description: Review submitted

    delete:
      operationId: deleteReview
      summary: Delete your review
      x-cli:
        command: store delete-review
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      responses:
        "200":
          description: Deleted

  # ---------------------------------------------------------------------------
  # My Apps — author CRUD
  # ---------------------------------------------------------------------------

  /api/my/apps:
    get:
      operationId: listMyStoreApps
      summary: List apps I authored
      x-cli:
        command: myapps list
      responses:
        "200":
          description: OK

    post:
      operationId: createStoreApp
      summary: Create a new app (private, auto-installed)
      x-cli:
        command: myapps create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string, description: "App slug (lowercase, hyphens)" }
                displayName: { type: string, description: Display name }
                description: { type: string, description: Short description }
                category:    { type: string, description: "Category slug" }
                icon:        { type: string, description: Lucide icon name }
                color:       { type: string, description: Hex color }
      responses:
        "201":
          description: Created

  /api/my/apps/{id}:
    get:
      operationId: getMyStoreApp
      summary: Get my app detail
      x-cli:
        command: myapps get
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      responses:
        "200":
          description: OK

    put:
      operationId: updateStoreApp
      summary: Update my app metadata
      x-cli:
        command: myapps update
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:     { type: string, description: Display name }
                description:     { type: string, description: Short description }
                longDescription: { type: string, description: Full markdown description }
                version:         { type: string, description: Semver version }
                icon:            { type: string, description: Lucide icon name }
                color:           { type: string, description: Hex color }
                category:        { type: string, description: Category slug }
                tags:            { type: array, items: { type: string }, description: Search tags }
      responses:
        "200":
          description: Updated

    delete:
      operationId: deleteStoreApp
      summary: Delete my app (removes disk files, reviews, shares)
      x-cli:
        command: myapps delete
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      responses:
        "200":
          description: Deleted

  /api/my/apps/{id}/publish:
    post:
      operationId: publishStoreApp
      summary: Validate and publish app to the store
      x-cli:
        command: myapps publish
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      responses:
        "200":
          description: Published

  /api/my/apps/{id}/visibility:
    patch:
      operationId: setVisibility
      summary: Set app visibility (private, shared, unlisted, public)
      x-cli:
        command: myapps visibility
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visibility]
              properties:
                visibility: { type: string, enum: [private, shared, unlisted, public], description: Visibility level }
      responses:
        "200":
          description: Updated

  # ---------------------------------------------------------------------------
  # My Apps — sharing
  # ---------------------------------------------------------------------------

  /api/my/apps/{id}/share:
    post:
      operationId: shareApp
      summary: Share app with a specific user
      x-cli:
        command: myapps share
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string, description: User ID to share with }
      responses:
        "201":
          description: Shared

  /api/my/apps/{id}/share-link:
    post:
      operationId: shareAppLink
      summary: Generate a share link token
      x-cli:
        command: myapps share-link
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      responses:
        "201":
          description: Share link created

  /api/my/apps/{id}/shares:
    get:
      operationId: listShares
      summary: List shares for my app
      x-cli:
        command: myapps shares
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      responses:
        "200":
          description: OK

  /api/my/apps/{id}/shares/{shareId}:
    delete:
      operationId: deleteShare
      summary: Revoke a share
      x-cli:
        command: myapps delete-share
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
        - name: shareId
          in: path
          required: true
          schema: { type: string }
          description: Share ID
      responses:
        "200":
          description: Revoked

  # ---------------------------------------------------------------------------
  # My Apps — tools CRUD
  # ---------------------------------------------------------------------------

  /api/my/apps/{id}/tools:
    post:
      operationId: addStoreTool
      summary: Add a tool to my app
      x-cli:
        command: myapps add-tool
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, script]
              properties:
                name:        { type: string, description: Tool name }
                description: { type: string, description: Tool description }
                toolClass:   { type: string, description: "read-only, read-write, or destructive" }
                mode:        { type: string, description: "Execution mode (empty or qa)" }
                script:      { type: string, description: "JavaScript source (must define handle(params))" }
      responses:
        "201":
          description: Created

  /api/my/apps/{id}/tools/{name}:
    put:
      operationId: updateStoreTool
      summary: Update a tool in my app
      x-cli:
        command: myapps update-tool
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Tool name
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string, description: Tool description }
                toolClass:   { type: string, description: "read-only, read-write, or destructive" }
                mode:        { type: string, description: "Execution mode (empty or qa)" }
                script:      { type: string, description: JavaScript source }
      responses:
        "200":
          description: Updated

    delete:
      operationId: deleteStoreTool
      summary: Delete a tool from my app
      x-cli:
        command: myapps delete-tool
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Tool name
      responses:
        "200":
          description: Deleted

  # ---------------------------------------------------------------------------
  # My Apps — prompts CRUD
  # ---------------------------------------------------------------------------

  /api/my/apps/{id}/prompts:
    post:
      operationId: addStorePrompt
      summary: Add a prompt to my app
      x-cli:
        command: myapps add-prompt
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, body]
              properties:
                name:        { type: string, description: Prompt name }
                description: { type: string, description: Prompt description }
                body:        { type: string, description: "Markdown body with {{key}} placeholders" }
      responses:
        "201":
          description: Created

  /api/my/apps/{id}/prompts/{name}:
    put:
      operationId: updateStorePrompt
      summary: Update a prompt in my app
      x-cli:
        command: myapps update-prompt
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Prompt name
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string, description: Prompt description }
                body:        { type: string, description: Markdown body }
      responses:
        "200":
          description: Updated

    delete:
      operationId: deleteStorePrompt
      summary: Delete a prompt from my app
      x-cli:
        command: myapps delete-prompt
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Store app ID
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Prompt name
      responses:
        "200":
          description: Deleted
